```Application.kt```

```Kotlin
import ru.altmanea.edu.server.model.Config
fun main() {
    embeddedServer(
        Netty,
        port = Config.serverPort,
        host = Config.serverDomain,
        watchPaths = listOf("classes", "resources")
    ) {
        main()
    }.start(wait = true)
}
fun Application.main(test: Boolean = true) {
    install(ContentNegotiation) { json() }
    routing { index() }
}
```


--

```Application.kt```

```Kotlin
fun Route.index() {
    get("/") {
        call.respondHtml(HttpStatusCode.OK) {
            head {
                meta { attributes += "charset" to "UTF-8" }
                title { +"Web App Client" } }
            body {
                div { attributes += "id" to "root" }
                script ("text/javascript", "client.js") { } } } }
    static {
        resource("/client.js","client.js")
        resource("/client.js.map","client.js.map") } }
