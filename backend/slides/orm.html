# DSL

--

### Создание таблиц

```Kotlin
object Cities : Table() {
    val id = integer("id").autoIncrement() // Column<Int>
    val name = varchar("name", 50) // Column<String>
    override val primaryKey = PrimaryKey(id, name = "PK_Cities_ID")
}
object Users : Table() {
    val id = varchar("id", 10) // Column<String>
    val name = varchar("name", length = 50) // Column<String>
    val cityId = (integer("city_id") references Cities.id).nullable() 
    override val primaryKey = PrimaryKey(id, name = "PK_User_ID")
}
transaction {
	SchemaUtils.create(Cities, Users) }
```

--

### Создание элемента

```Kotlin
fun <T : Table> T.insert(
	body: T.(InsertStatement<Number>
) -> Unit): InsertStatement<Number>	
```

```Kotlin
val saintPetersburgId = Cities.insert {
	it[name] = "St. Petersburg"
} get Cities.id
val munichId = Cities.insert {
	it[name] = "Munich"
} get Cities.id
val pragueId = Cities.insert {
	it.update(name, stringLiteral("   Prague   ")
		.trim().substring(1, 2))
}[Cities.id]
```

--

### Создание элемента


```Kotlin
Users.insert {
	it[id] = "andrey"
	it[name] = "Andrey"
	it[Users.cityId] = saintPetersburgId
}
Users.insert {
	it[id] = "sergey"
	it[name] = "Sergey"
	it[Users.cityId] = munichId
}
```

# DAO

--

### Таблица и класс

```Kotlin
object StarWarsFilms : IntIdTable() {
	val sequelId = integer("sequel_id").uniqueIndex()
	val name = varchar("name", 50)
	val director = varchar("director", 50)
} 
```
```Kotlin
class StarWarsFilm(id: EntityID<Int>) : IntEntity(id) {
	companion object : IntEntityClass<StarWarsFilm>(StarWarsFilms)
	var sequelId by StarWarsFilms.sequelId 
	var name     by StarWarsFilms.name
	var director by StarWarsFilms.director
}
```

### Many to One

```Kotlin
object Users: IntIdTable() {
    val name = varchar("name", 50) }
class User(id: EntityID<Int>): IntEntity(id) {
    companion object : IntEntityClass<User>(Users)
    var name by Users.name }
object UserRatings: IntIdTable() {
    val value = long("value")
    val film = reference("film", StarWarsFilms)
    val user = reference("user", Users) }
class UserRating(id: EntityID<Int>): IntEntity(id) {
    companion object : IntEntityClass<UserRating>(UserRatings)
    var value by UserRatings.value
    var film by StarWarsFilm referencedOn UserRatings.film 
    var user by User referencedOn UserRatings.user }
```

--

### Many to Many

```Kotlin
object Actors: IntIdTable() {
    val firstname = varchar("firstname", 50)
    val lastname = varchar("lastname", 50) }
class Actor(id: EntityID<Int>): IntEntity(id) {
    companion object : IntEntityClass<Actor>(Actors)
    var firstname by Actors.firstname
    var lastname by Actors.lastname }
object StarWarsFilmActors : Table() {
    val starWarsFilm = reference("starWarsFilm", StarWarsFilms)
    val actor = reference("actor", Actors)
    override val primaryKey = PrimaryKey(starWarsFilm, actor) }
class StarWarsFilm(id: EntityID<Int>) : IntEntity(id) {
    companion object : IntEntityClass<StarWarsFilm>(StarWarsFilms)
    var actors by Actor via StarWarsFilmActors
    ... }
```

# Repository

--

### Таблица

```Kotlin
abstract class ItemTable<E>(name: String = "") : UUIDTable(name) {
    val etag = long("etag")
    abstract fun readItem(result: ResultRow): RepoItem<E>
    abstract fun fill(builder: UpdateBuilder<Number>, elem: E)
}
```

--

### Таблица

```Kotlin
object StudentsTable: ItemTable<Student>() {
    val firstname = varchar("firstname", 50)
    val surname = varchar("surname", 50)
    override fun readItem(result: ResultRow) = 
        RepoItem(
			Student(result[firstname],result[surname]),
            result[id].toString(),
            result[etag] )
    override fun fill(builder: UpdateBuilder<Number>, elem: Student) {
        builder[etag] = System.currentTimeMillis()
        builder[firstname] = elem.firstname
        builder[surname] = elem.surname } }
```

--

### Репозиторий

```Kotlin
open class ExposedRepo<E>(
    val table: ItemTable<E>
) : Repo<E> {

    override fun get(uuid: String) =
        transaction {
            table
                .select { table.id eq UUID.fromString(uuid) }
                .firstOrNull()
                ?.let { table.readItem(it) }
        }
```

--

### Репозиторий

```Kotlin
override fun findAll() =
	transaction {
		table
			.selectAll()
			.mapNotNull {
				table.readItem(it)
			} }

override fun create(element: E) =
	transaction {
		table.insert {
			fill(it, element)
		}
		true
	}
```

--

### Репозиторий

```Kotlin
override fun update(uuid: String, value: E) =
	transaction {
		table.update(
			{ table.id eq UUID.fromString(uuid) }
		) { table.fill(it, value) } > 0 }
override fun delete(uuid: String) =
	transaction {
		table.deleteWhere {
			table.id eq UUID.fromString(uuid)
		} > 0 }
override fun isEmpty() =
	transaction {
		table.select {
			table.id.isNotNull()
		}.empty() }
```
