# Управление доступом

--

### Элементы управления доступом

- *S* ubject
- *O* bject
- *P* ermissions

--

### Mandatory access control, MAC

S и O имеют security attributes. Администратором устанавливает политика, определяющая разрешения на основе соотношения атрибутов.

Multilevel security, MLS

--

### Discretionary access control, DAC

Доступ на основе списков управления доступа к O или матрицы доступа.

Списки управляются суперпользователем и (или) владельцем.

Для упрощения списков используют группы S.

--

### Role Based Access Control, RBAC

*R* ole

- Один субъект может иметь несколько ролей.
- Одну роль могут иметь несколько субъектов.
- Одна роль может иметь несколько разрешений.
- Одно разрешение может принадлежать нескольким ролям.

--

### Attribute-based access control (ABAC)

Проблемы RBAC, которые решаются с помощью дополнительных атрибутов:
- размножение ролей (например, секретарь каждой кафедры);
- сложные условия (например, доступ только к своим документам).

```Kotlin
class PipelinePhase(val name: String)
class Pipeline <TSubject : Any, TContext : Any> {
    constructor(vararg phases: PipelinePhase)
    val attributes: Attributes
    fun addPhase(phase: PipelinePhase)
    fun insertPhaseAfter(reference: PipelinePhase, 
		phase: PipelinePhase)
    fun insertPhaseBefore(reference: PipelinePhase, 
		phase: PipelinePhase)
    fun intercept(phase: PipelinePhase, 
		block: suspend PipelineContext.(TSubject) -> Unit)
    fun merge(from: Pipeline)
    suspend fun execute(context: TContext, 
		subject: TSubject): TSubject
}

# Authorization plugin

--

### Ktor plugin

```Kotlin
class AuthorizationException(override val message: String) : 
	Exception(message)

class RoleBasedAuthorization(config: Configuration) {
    private val getRoles = config._getRoles
    class Configuration {
        internal var _getRoles: (Principal) -> Set<Role> 
			= { emptySet() }
        fun getRoles(builder: (Principal) -> Set<Role>) {
            _getRoles = builder
        }
    }
```

--

```Kotlin
fun interceptPipeline(
	pipeline: ApplicationCallPipeline,
	allowedRoles: Set<Role> ) {
	pipeline.insertPhaseAfter(ApplicationCallPipeline.Features, 
		Authentication.ChallengePhase)
	pipeline.insertPhaseAfter(Authentication.ChallengePhase, 
		AuthorizationPhase)
	pipeline.intercept(AuthorizationPhase) {
		val principal = call.authentication.principal<Principal>()
		if (principal == null) 
			throw AuthorizationException("No user name")
		else if (
			allowedRoles.intersect(getRoles(principal)).isEmpty()
		) throw AuthorizationException("Permission is denied") } }
```

--

```Kotlin
companion object Feature : ApplicationFeature<
	ApplicationCallPipeline, Configuration, RoleBasedAuthorization> {
	override val key = AttributeKey<RoleBasedAuthorization>(
		"RoleBasedAuthorization")
	val AuthorizationPhase = PipelinePhase("Authorization")
	override fun install(
		pipeline: ApplicationCallPipeline, 
		configure: Configuration.() -> Unit
	): RoleBasedAuthorization {
		val configuration = Configuration().apply(configure)
		return RoleBasedAuthorization(configuration)
	}
}
```

--

```Kotlin
class AuthorizedRouteSelector(private val description: String) 
	: RouteSelector() {
    override fun evaluate(
		context: RoutingResolveContext, segmentIndex: Int) = 
		RouteSelectorEvaluation.Constant
    override fun toString(): String = "(authorize ${description})" }
fun Route.authorizedRoute(allowedRoles: Set<Role>,
    build: Route.() -> Unit ): Route {
    val authorizedRoute = createChild(
        AuthorizedRouteSelector(
			"Roles: ${allowedRoles.joinToString(", ")}") )
    application.feature(RoleBasedAuthorization)
		.interceptPipeline(authorizedRoute, allowedRoles)
    authorizedRoute.build()
    return authorizedRoute }
```
