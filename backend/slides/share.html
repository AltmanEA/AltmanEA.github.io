# Проблема совместного доступа к ресурсам

--

### Уровни совместного доступа

- базы данных
- бизнес-логики
- API сервера

--

### Решения на уровне API сервера

- push-уведомления (websocket)
- refetch (react query)
- контроль версий (etag)

---

# Сервер

--

```rest/lesson.kt```

```Kotlin
put("{id}/name") {
    val id = call.parameters["id"] ..
    val lessonItem = lessonsRepo[id] ..
    val clientEtag = call.request.headers["etag"]?.toLong()
    call.application.log.info("..")
    if(lessonItem.etag != clientEtag){
        call.respondText("Element had updated on server",
            status = HttpStatusCode.BadRequest ) }
    else {
        val newName = call.receive<Lesson>().name
        val newLesson = lessonItem.elem.copy(name = newName)
        lessonsRepo.update(lessonItem.uuid, newLesson)
        call.respondText("Lesson name updates correctly", 
            status = HttpStatusCode.Created)}}
```
