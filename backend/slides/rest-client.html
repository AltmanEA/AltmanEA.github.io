val queryClient = QueryClient()
fun main() { 
    render(document.getElementById("root")!!) {
        HashRouter { QueryClientProvider {
            attrs.client = queryClient
            Link { attrs.to = "/" 
                +"Students" }
            Routes {
                Route { attrs.index = true
                    attrs.element = 
                        createElement(fcContainerStudentList()) }
                Route { attrs.path = "/student/:id"
                    attrs.element = 
                        createElement(fcContainerStudent())} }
            child(cReactQueryDevtools()) {} } } } }

# Контейнер списка студентов

--

```client/../component/studentList.kt```

```Kotlin
fun fcContainerStudentList() = fc("QueryStudentList") { _: Props ->
    val queryClient = useQueryClient()

    val query = useQuery< Any, QueryError, 
        AxiosResponse< Array< Item< Student >>>, Any>(
        "studentList",
        {
            axios< Array< Student >>(jso {
                url = studentsURL
            })
        }
    )
```

--

```client/../component/studentList.kt```

```Kotlin
val addStudentMutation = useMutation<Any, Any, Any, Any>(
    { student: Student ->
        axios<String>(jso {
            url = studentsURL
            method = "Post"
            headers = json(
                "Content-Type" to "application/json"
            )
            data = Json.encodeToString(student)
        })
    },
    options = jso {
        onSuccess = { _: Any, _: Any, _: Any? ->
            queryClient.invalidateQueries<Any>("studentList")
        } } )
```

--

```client/../component/studentList.kt```

```Kotlin
val deleteStudentMutation = useMutation<Any, Any, Any, Any>(
    { studentItem: Item<Student> ->
        axios<String>(jso {
            url = "$studentsURL/${studentItem.uuid}"
            method = "Delete"
        })
    },
    options = jso {
        onSuccess = { _: Any, _: Any, _: Any? ->
            queryClient.invalidateQueries<Any>("studentList")
        }
    }
)
```

```client/../component/studentList.kt```

```Kotlin
if (query.isLoading) div { +"Loading .." }
else if (query.isError) div { +"Error!" }
else {
    val items = query.data?.data?.toList() ?: emptyList()
    child(fcStudentList()) {
        attrs.students = items
        attrs.addStudent = { f, s ->
            addStudentMutation.mutate(Student(f, s), null)
        }
        attrs.deleteStudent = {
            deleteStudentMutation.mutate(items[it], null)
        }
    }
}
