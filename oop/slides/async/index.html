## Потоки

~~~

### Процессы и Потоки

<pre class="kotlin"><code>fun printThreadInfo() {
    val currentThread = Thread.currentThread()
    val processID = ManagementFactory.getRuntimeMXBean().name
    println("Thread: ${currentThread.name}")
    println("Process: $processID")
}</code></pre>

~~~

### Создание потока

<pre class="kotlin"><code>class MyThread : Thread() {
    override fun run() {
        printThreadInfo()
    }
}</code></pre>

~~~

### Запуск потока

<pre class="kotlin"><code>    printThreadInfo()
    MyThread().start()
    Thread { // interface Runnable
        printThreadInfo()
    }
        .start()
    thread(name = "MyThread") { printThreadInfo() }
</code></pre>

</code></pre>

## Основы

~~~

### [Coroutine](https://kotlinlang.org/docs/reference/coroutines/coroutines-guide.html)

<pre class="kotlin"><code>import kotlinx.coroutines.*

fun main() {
	GlobalScope.launch { 
// launch a new coroutine in background and continue
// non-blocking delay for 1 second (default time unit is ms)
		delay(1000L)
// print after delay
		println("World!") 
	}
// main thread continues while coroutine is delayed
	println("Hello,")
// block main thread for 2 seconds to keep JVM alive
	Thread.sleep(2000L) 
}
</code></pre>
<pre><code>
Hello,
World!
</code></pre>

~~~

### Код без блокировки потока

<pre class="kotlin"><code>fun main() = runBlocking { 
// start main coroutine
	GlobalScope.launch { 
// launch a new coroutine in background and continue
		delay(1000L)
		println("World!")
	}
// main coroutine continues here immediately
	println("Hello,")
	// delaying for 2 seconds to keep JVM alive
	delay(2000L)
}
</code></pre>
<pre><code>
Hello,
World!
</code></pre>

~~~

### Сценарий: ожидание задачи

<pre class="kotlin"><code>fun main() = runBlocking {
    val job = GlobalScope.launch {
// launch a new coroutine and keep a reference to its Job
        delay(1000L)
        print("World")
    }
    println("Hello,")
// wait until child coroutine completes}
    job.join()
    println("!")
}
</code></pre>
<pre><code>
Hello,
World!
</code></pre>

~~~

### Coroutine Scope

<pre class="kotlin"><code>fun main() = runBlocking { 
    launch { 
        delay(200L)
        println("Task from runBlocking") // 2
    }
    coroutineScope { // Creates a coroutine scope
        launch {
            delay(500L) 
            println("Task from nested launch") // 3
        }
		delay(100L)
        println("Task from coroutine scope") // 1
    }
    println("Coroutine scope is over") // 4
}
</code></pre>

~~~

### Suspending function

<pre class="kotlin"><code>fun main() = runBlocking {
    launch { doWorld() }
    println("Hello,")
}

suspend fun doWorld() {
    delay(1000L)
    println("World!")
}
</code></pre>

!~~~!

## Отмена выполнения и таймауты

~~~

### Отмена выполнения

<pre class="kotlin"><code>val job = launch {
    repeat(1000) { i ->
        println("job: I'm sleeping $i ...")
        delay(500L)
    }
}
delay(1300L) // delay a bit
println("main: I'm tired of waiting!")
job.cancel() // cancels the job
job.join() // waits for job's completion
// job.cancelAndJoin()
println("main: Now I can quit.")
</code></pre>
<pre><code>job: I'm sleeping 0 ...
job: I'm sleeping 1 ...
job: I'm sleeping 2 ...
main: I'm tired of waiting!
main: Now I can quit.
</code></pre>

~~~

### Кооперативное прерывание

<pre class="kotlin"><code>val start = System.currentTimeMillis()
	val job = launch(Dispatchers.Default) {
		var next = start
		var i = 0
		while (isActive) { // cancellable computation loop
			if (System.currentTimeMillis() >= next) {
				println("job: I'm sleeping ${i++} ...")
				nextPrintTime += 500L
			}
		}
	}
	delay(1300L) // delay a bit
	println("main: I'm tired of waiting!")
	job.cancelAndJoin() 
	println("main: Now I can quit.")
</code></pre>
<pre><code>job: I'm sleeping 0 ...
job: I'm sleeping 1 ...
job: I'm sleeping 2 ...
main: I'm tired of waiting!
main: Now I can quit.
</code></pre>

~~~
