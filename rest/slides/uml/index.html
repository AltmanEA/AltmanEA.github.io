## Диаграммы прецедентов

---

### Проектируемая система

Спроектируем систему, позволяющую преподавателям учитывать выполнение студентами заданий.


---

### Идея диаграмм прецедентов

- Диаграмма прецедентов используется для визуализации задач, решаемых системой.
- Объектами диаграммы являются:
	- actor (пользователь системы);
	- precedent (use case, сценарий использования системы).
- Объекты диаграммы состоят друг с другом в отношениях:
	- ассоциация;
	- обобщение;
	- и др.

---

### Объекты и отношения

<div class="container">
<div class="col" data-markdown>

```
@startuml

	actor Tutor
	usecase SetTask
	Tutor --> SetTask
	
@enduml
```

</div>
<div class="col">
<img src = "images/precedent_1.svg">
</div>
</div>

---

### Сокращения

<div class="container">
<div class="col" data-markdown>

```
@startuml

	left to right direction

	actor Tutor as Tut
	usecase SetTask as Set
	Tut --> Set
	Tut --> (SetGrade)

@enduml
```

</div>
<div class="col">
<img src = "images/precedent_2.svg">
</div>
</div>

---

### Границы системы

<div class="container">
<div class="col" data-markdown>

```
@startuml

	left to right direction

    actor Tutor

    rectangle {
        Tutor -- ("Set task")
        Tutor -- ("Set grade")
        Tutor -- ("Read grades")
    } 

@enduml
```

</div>
<div class="col">
<img src = "images/precedent_3.svg">
</div>
</div>

---

### Отношение обобщение

<div class="container">
<div class="col" data-markdown>

```
@startuml

	left to right direction

    Person <|-- Tutor   
    Person <|-- Student
    Person <|-- Admin

    rectangle {
        Tutor -- ("Set task")
        Tutor -- ("Set grade")
        Tutor -- ("Read grades")
    } 

@enduml
```

</div>
<div class="col">
<img src = "images/precedent_4.svg">
</div>
</div>

---

### Отношение обобщение

<div class="container">
<div class="col" data-markdown>

```
@startuml
	left to right direction	
    Person <|-- Tutor   
    Person <|-- Student
	Person <|-- Admin
    rectangle {
        Tutor -- ("Set task")
        Tutor -- ("Set grade")
        Tutor -- ("Read grades")
        Student -- ("Read grades")
        Admin -- ("Set Person")
        Admin -- ("Set Course")
        Admin -- ("Set Course Person")
    }
@enduml
```

</div>
<div class="col">
<img src = "images/precedent_5.svg">
</div>
</div>

---

### Стереотипы

<div class="container">
<div class="col" data-markdown>

```
@startuml
	...
	rectangle {
        usecase ("Set grade") as SG
        usecase ("Read grades") as RG
        usecase ("Set Course") as SC
		usecase ("Set Course Person") as SCP
		...
    }

    SG --> RG : << extend >>
    SC --> SCP : << include >>

@enduml```

</div>
<div class="col">
<img src = "images/precedent_6.svg">
</div>
</div>
