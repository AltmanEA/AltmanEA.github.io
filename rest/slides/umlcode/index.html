## Репозиторий

~~~

### Идентификация

<pre class="Kotlin"><code>
interface Item{
	val name: String
}
</code></pre>

~~~

### Интерфейс репозитория

<pre class="Kotlin"><code>
interface Repo< T : Item> {
	fun add(element: T): Boolean
	fun get(name: String): T?
	fun all(): List< T >
}
</code></pre>

~~~

### Реализация репозитория

<pre class="Kotlin"><code>
class ListRepo< T: Item> : Repo< T > {
	private val shadow = ArrayList< T >()
	override fun add(element: T) =
		shadow.add(element)
	override operator fun get(name: String) =
		shadow.find { it.name == name }
	override fun all(): List< T > = shadow
}
</code></pre>

~~~

### Репозитории в системе

<pre class="Kotlin"><code>
val persons = ListRepo< Person >()
val courses = ListRepo< Course >()
val taskTypes = ListRepo< Type >()
</code></pre>

!~~~!

## Классы

~~~

### Person

<pre class="Kotlin"><code>
open class Person(
	override val name: String
) : Item {
	val courses = ArrayList< Course >()

class Student (
    name: String,
    val group: String
) : Person(name)

class Tutor(
    name: String,
    val post: String
) : Person(name)
</code></pre>

~~~

### Type, Grade

<pre class="Kotlin"><code>
class Type (
	override val name: String,
	val shortname: String
) : Item

class Grade (
    val value: Int,
    val date: LocalDate,
    val student: Student
)
</code></pre>

~~~

### Task

<pre class="Kotlin"><code>
class Task(
    override val name: String,
    val type: Type,

</code></pre>

!~~~!

### Действия Course

<pre class="Kotlin"><code>
fun setGrade(
	taskName: String, 
	studentName: String, 
	value: Int, 
	date: LocalDate = LocalDate.now()
) {
	val task = tasks
		.find { it.name == taskName } ?: return
	val student = students
		.find { it.name == studentName } ?: return
    if (value !in 0..task.maxValue) return
    val grade = Grade(value, date, student)
    task.grades += grade
}
</code></pre>
